[project]
site_name = "Isabella Robot Documentation"
site_description = "Comprehensive documentation for the Isabella Robot project"
site_url = "https://nm-tafe.github.io/Isabella_Robot_Doc/"
repo_url = "https://github.com/NM-TAFE/Isabella_Robot_Doc"
repo_name = "Isabella_Robot_Doc"

[theme]
name = "material"

[[theme.palette]]
scheme = "default"
primary = "blue"
accent = "amber"

[[theme.palette]]
scheme = "slate"
primary = "blue"
accent = "amber"

[plugins.search]
lang = "en"

[markdown_extensions.admonition]

[markdown_extensions.attr_list]

[markdown_extensions.codehilite]

[markdown_extensions.meta]

[markdown_extensions.pymdownx-emoji]

[markdown_extensions.pymdownx-tasklist]
custom_checkbox = true

[markdown_extensions.pymdownx-highlight]
use_pygments = true

[markdown_extensions.pymdownx-superfences]

[markdown_extensions.pymdownx-tabbed]
alternate_style = true

[markdown_extensions.toc]
permalink = true

